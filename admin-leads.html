<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATM Leads Admin</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--red:#c8102e;--red3:#e8294a;--blk:#0f0f0f;--off:#f4f4f4;--mid:#555;--light:#888;--ok:#0a7a35;--warn:#b26a00}body{font-family:Barlow,sans-serif;background:var(--off);color:#111}.wrap{max-width:1240px;margin:auto;padding:28px}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}.logo{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;color:var(--red);letter-spacing:.02em;line-height:.9}.sub{color:var(--mid);margin-top:4px}.card{background:#fff;border-radius:8px;box-shadow:0 8px 35px rgba(0,0,0,.08);padding:20px;margin-top:20px}.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}input,select,button{font:inherit;padding:10px;border:1px solid #ddd;border-radius:4px;background:#fff}button{background:var(--red);color:#fff;border:none;font-weight:700;cursor:pointer}button:hover{background:var(--red3)}button.secondary{background:#111}button.ghost{background:#fff;color:#111;border:1px solid #ccc}.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-top:18px}.stat{background:#111;color:#fff;border-radius:7px;padding:16px}.stat b{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:#fff;display:block}.stat span{color:rgba(255,255,255,.65);font-size:.78rem;text-transform:uppercase;letter-spacing:.08em}table{width:100%;border-collapse:collapse;margin-top:18px;font-size:.9rem}th,td{text-align:left;border-bottom:1px solid #eee;padding:10px;vertical-align:top}th{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:#777}.err{color:var(--red);font-weight:700}.pill{display:inline-block;padding:3px 8px;border-radius:999px;background:#111;color:#fff;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em}.redeemed{background:var(--ok)}.issued{background:var(--red)}.expired,.void{background:#777}.row-actions{display:flex;gap:6px;flex-wrap:wrap}.row-actions button{font-size:.78rem;padding:6px 8px}.filters{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.muted{color:#777;font-size:.86rem;line-height:1.4}.concerns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.concern{background:#f8f8f8;border-left:4px solid var(--red);padding:10px 12px;border-radius:4px}.concern b{display:block}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:20px}.modal-inner{background:#fff;border-radius:8px;max-width:460px;width:100%;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.28)}.modal-inner h2{font-family:'Bebas Neue';font-size:2rem;margin-bottom:10px}.modal-inner textarea{width:100%;min-height:90px;margin:10px 0;padding:10px;border:1px solid #ddd;border-radius:4px;font-family:Barlow}.modal-actions{display:flex;justify-content:flex-end;gap:8px}@media(max-width:900px){.stats{grid-template-columns:repeat(2,1fr)}table{font-size:.8rem}.hide-sm{display:none}}@media(max-width:600px){.wrap{padding:16px}.stats{grid-template-columns:1fr}.actions input{width:100%}.card{padding:14px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div><div class="logo">ATM Leads</div><p class="sub">Lead capture, vouchers, and campaign follow-up.</p></div><div class="actions"><input id="key" type="password" placeholder="Admin key"><button id="saveKey" class="secondary">Save Key</button><button id="load">Load</button><button id="csv" class="ghost">CSV</button></div></div>
  <div class="card"><div class="filters"><input id="q" placeholder="Search name, email, phone, voucher"><select id="campaign"><option value="fierce_fabulous_2026">Fierce & Fabulous Expo</option><option value="">All campaigns</option></select><select id="statusFilter"><option value="">All vouchers</option><option value="issued">Issued</option><option value="redeemed">Redeemed</option><option value="expired">Expired</option></select><button id="process" class="secondary">Process Emails Now</button></div><p id="status" class="muted" style="margin-top:12px">Enter admin key and load leads.</p></div>
  <div class="stats" id="stats" style="display:none"><div class="stat"><b id="sLeads">0</b><span>Leads</span></div><div class="stat"><b id="sConsented">0</b><span>Consented</span></div><div class="stat"><b id="sVouchers">0</b><span>Vouchers</span></div><div class="stat"><b id="sRedeemed">0</b><span>Redeemed</span></div><div class="stat"><b id="sSent">0</b><span>Voucher emails</span></div><div class="stat"><b id="sFailed">0</b><span>Failed emails</span></div></div>
  <div class="card" id="concernCard" style="display:none"><strong>Concerns</strong><div class="concerns" id="concerns"></div></div>
  <div class="card"><div style="overflow:auto"><table id="table" style="display:none"><thead><tr><th>Date</th><th>Name</th><th>Email</th><th>Phone</th><th>Concern</th><th>Voucher</th><th>Status</th><th>Expires</th><th>Actions</th></tr></thead><tbody></tbody></table></div></div>
</div>
<div class="modal" id="redeemModal"><div class="modal-inner"><h2>Redeem Voucher</h2><p id="redeemCode" class="muted"></p><textarea id="redeemNote" placeholder="Optional note, e.g. booked full FST session"></textarea><div class="modal-actions"><button class="ghost" id="cancelRedeem">Cancel</button><button id="confirmRedeem">Redeem</button></div></div></div>
<script>
const API_BASE='';const key=document.getElementById('key'), statusBox=document.getElementById('status'), table=document.getElementById('table'), tbody=table.querySelector('tbody'), q=document.getElementById('q'), campaign=document.getElementById('campaign'), statusFilter=document.getElementById('statusFilter');let redeeming=null;key.value=localStorage.getItem('atm_admin_key')||'';function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function authHeaders(){return {'Authorization':'Bearer '+key.value,'content-type':'application/json'}}function fmt(d){if(!d)return'';try{return new Date(d).toLocaleString('en-CA',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}catch{return d}}function money(cents){return '$'+((cents||0)/100).toFixed(0)}function setStatus(msg,isErr=false){statusBox.innerHTML=isErr?'<span class="err">'+esc(msg)+'</span>':esc(msg)}
document.getElementById('saveKey').onclick=()=>{localStorage.setItem('atm_admin_key',key.value);setStatus('Admin key saved on this device.')};
async function loadStats(){const r=await fetch(`${API_BASE}/api/admin/stats?campaign=${encodeURIComponent(campaign.value||'fierce_fabulous_2026')}`,{headers:authHeaders()});const j=await r.json();if(!r.ok||!j.ok)throw new Error(j.error||'Stats failed');document.getElementById('stats').style.display='grid';const o=j.overview||{};sLeads.textContent=o.leads||0;sConsented.textContent=o.consented||0;sVouchers.textContent=o.vouchers||0;sRedeemed.textContent=o.redeemed||0;sSent.textContent=o.voucher_emails_sent||0;sFailed.textContent=o.failed_emails||0;const cc=document.getElementById('concernCard'), cwrap=document.getElementById('concerns');cwrap.innerHTML=(j.by_concern||[]).map(x=>`<div class="concern"><b>${esc(x.count)}</b><span>${esc(x.primary_concern)}</span></div>`).join('');cc.style.display=(j.by_concern||[]).length?'block':'none'}
async function load(){setStatus('Loading...');table.style.display='none';try{await loadStats();const params=new URLSearchParams();if(q.value)params.set('q',q.value);if(campaign.value)params.set('campaign',campaign.value);if(statusFilter.value)params.set('status',statusFilter.value);const r=await fetch(`${API_BASE}/api/admin/leads?${params}`,{headers:authHeaders()});const j=await r.json();if(!r.ok||!j.ok)throw new Error(j.error||'Failed to load leads');tbody.innerHTML=(j.leads||[]).map(x=>`<tr><td>${esc(fmt(x.created_at))}</td><td><strong>${esc(x.first_name)} ${esc(x.last_name)}</strong><br><span class="muted">${esc(x.campaign_name||x.campaign_id)}</span></td><td>${esc(x.email)}</td><td>${esc(x.phone)}</td><td>${esc(x.primary_concern)}${x.concern_other?'<br><span class="muted">'+esc(x.concern_other)+'</span>':''}</td><td><strong>${x.voucher_code?esc(x.voucher_code):'<span class="muted">Not issued</span>'}</strong></td><td><span class="pill ${esc(x.voucher_status||x.validation_status||'pending_validation')}">${esc(x.voucher_status||x.validation_status||'pending_validation')}</span></td><td>${esc(fmt(x.expires_at))}</td><td><div class="row-actions">${x.voucher_code?`<button onclick="resend('${esc(x.voucher_code)}')" class="secondary">Resend</button>`:''}<button onclick="editEmail('${esc(x.lead_id)}','${esc(x.email)}')" class="secondary">Edit Email</button>${x.voucher_status==='issued'?`<button onclick="openRedeem('${esc(x.voucher_code)}')">Redeem</button><button onclick="voidLead('${esc(x.lead_id)}')" class="ghost">Void</button>`:`<button onclick="voidLead('${esc(x.lead_id)}')" class="ghost">Void</button>`}</div></td></tr>`).join('');setStatus(`${(j.leads||[]).length} leads loaded.`);table.style.display='table'}catch(e){setStatus(e.message,true)}}

async function editEmail(leadId,currentEmail){const next=prompt('Correct email address:',currentEmail||'');if(!next)return;try{const r=await fetch(`${API_BASE}/api/admin/leads/update-email`,{method:'POST',headers:authHeaders(),body:JSON.stringify({lead_id:leadId,email:next,resend:true})});const j=await r.json();if(!r.ok||!j.ok)throw new Error(j.error||'Email update failed');setStatus(`Email updated and voucher resent to ${next}.`);await load()}catch(e){setStatus(e.message,true)}}
async function voidLead(leadId){const reason=prompt('Reason for voiding this lead:', 'Bad email / invalid lead');if(reason===null)return;try{const r=await fetch(`${API_BASE}/api/admin/leads/void`,{method:'POST',headers:authHeaders(),body:JSON.stringify({lead_id:leadId,reason})});const j=await r.json();if(!r.ok||!j.ok)throw new Error(j.error||'Void failed');setStatus('Lead voucher voided and pending emails skipped.');await load()}catch(e){setStatus(e.message,true)}}

async function resend(code){try{const r=await fetch(`${API_BASE}/api/admin/emails/resend-voucher`,{method:'POST',headers:authHeaders(),body:JSON.stringify({code})});const j=await r.json();if(!r.ok||!j.ok)throw new Error(j.error||'Resend failed');setStatus(`Voucher ${code} resent.`)}catch(e){setStatus(e.message,true)}}
function openRedeem(code){redeeming=code;redeemCode.textContent='Voucher: '+code;redeemNote.value='';redeemModal.style.display='flex'}cancelRedeem.onclick=()=>redeemModal.style.display='none';confirmRedeem.onclick=async()=>{if(!redeeming)return;try{const r=await fetch(`${API_BASE}/api/admin/vouchers/redeem`,{method:'POST',headers:authHeaders(),body:JSON.stringify({code:redeeming,note:redeemNote.value})});const j=await r.json();if(!r.ok||!j.ok)throw new Error(j.error||'Redeem failed');redeemModal.style.display='none';setStatus(`Voucher ${redeeming} redeemed.`);await load()}catch(e){setStatus(e.message,true)}};
document.getElementById('load').onclick=load;document.getElementById('csv').onclick=()=>{if(!key.value)return setStatus('Enter admin key first.',true);const params=new URLSearchParams();if(q.value)params.set('q',q.value);if(campaign.value)params.set('campaign',campaign.value);if(statusFilter.value)params.set('status',statusFilter.value);location.href=`${API_BASE}/api/admin/leads.csv?key=${encodeURIComponent(key.value)}&${params}`};document.getElementById('process').onclick=async()=>{try{const r=await fetch(`${API_BASE}/api/admin/emails/process-now`,{method:'POST',headers:authHeaders(),body:'{}'});const j=await r.json();if(!r.ok||!j.ok)throw new Error(j.error||'Process failed');setStatus((j.sent||j.failed)?`Processed due emails. Sent: ${j.sent}, failed: ${j.failed}.`:'No due emails to process right now. Future follow-ups will send when scheduled.');await loadStats()}catch(e){setStatus(e.message,true)}};q.addEventListener('keydown',e=>{if(e.key==='Enter')load()});
</script>
</body>
</html>
