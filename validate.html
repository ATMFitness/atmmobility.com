<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Check-In | ATM Mobility & Therapy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--red:#c8102e;--blk:#0f0f0f;--off:#f4f4f4;--ok:#0a7a35}body{font-family:Barlow,sans-serif;background:var(--off);color:#111;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.card{width:100%;max-width:560px;background:#fff;border-radius:10px;box-shadow:0 18px 60px rgba(0,0,0,.12);overflow:hidden}.top{background:linear-gradient(135deg,#0f0f0f,#2b0710);color:#fff;padding:30px}.logo{font-family:'Bebas Neue';font-size:2rem;color:var(--red);letter-spacing:.03em}.logo span{color:#fff}.body{padding:28px;text-align:center}h1{font-family:'Bebas Neue';font-size:3.2rem;line-height:.9;margin-bottom:14px}.ok{color:var(--ok)}.err{color:#9b001b}.pending{color:var(--red)}p{line-height:1.55;color:#444;margin:10px 0}.code{background:#111;color:#fff;border-radius:7px;padding:16px;margin:20px auto;max-width:360px}.code .label{font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:#aaa;font-weight:700}.code .value{font-family:'Bebas Neue';font-size:2.8rem;letter-spacing:.08em}.btn{display:inline-block;background:var(--red);color:#fff;text-decoration:none;border:0;border-radius:4px;padding:13px 22px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:10px}.small{font-size:.86rem;color:#777}</style>
</head>
<body>
<div class="card"><div class="top"><div class="logo">ATM <span>MOBILITY &amp; THERAPY</span></div></div><div class="body" id="box"><h1 class="pending">CHECKING IN...</h1><p>Please wait while we validate your Stretch Reset waiver.</p></div></div>
<script>
const API_BASE='https://atm-leads.w-althea.workers.dev';
const box=document.getElementById('box');
const params=new URLSearchParams(location.search);
const staffCode=params.get('staff')||'';
const leadId=localStorage.getItem('atm_pending_lead_id')||'';
const validationToken=localStorage.getItem('atm_pending_validation_token')||'';
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function showError(msg){box.innerHTML=`<h1 class="err">CHECK-IN NEEDED</h1><p>${esc(msg)}</p><p class="small">Please return to the ATM Mobility &amp; Therapy desk for assistance.</p>`}
function showSuccess(out){localStorage.removeItem('atm_pending_lead_id');localStorage.removeItem('atm_pending_validation_token');box.innerHTML=`<h1 class="ok">CHECK-IN COMPLETE</h1><p>Your voucher has been emailed.</p><div class="code"><div class="label">Voucher Code</div><div class="value">${esc(out.voucher_code||'SENT')}</div></div><p><strong>$20 credited toward your first full session.</strong></p><a class="btn" href="${esc(out.booking_url||'https://atmmobility.com')}" target="_blank" rel="noopener">Book With ATM</a><p class="small">If the email does not arrive, please confirm your email with the ATM team.</p>`}
(async()=>{try{if(!staffCode)return showError('Staff validation QR is missing.');if(!leadId||!validationToken)return showError('This device does not have a pending waiver. Please keep the waiver confirmation page open and ask ATM staff for help.');const res=await fetch(`${API_BASE}/api/leads/validate`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({lead_id:leadId,validation_token:validationToken,staff_code:staffCode})});const out=await res.json().catch(()=>({}));if(!res.ok||!out.ok)throw new Error(out.error||'Validation failed.');showSuccess(out)}catch(e){showError(e.message||'Validation failed.')}})();
</script>
</body>
</html>
